<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculadora">

    <input type="text" class="display" id="display" disabled>

    <div class="botoes">

        <button class="funcao" onclick="limpar()">C</button>
        <button class="funcao" onclick="apagar()">←</button>
        <button class="funcao" onclick="adicionar('/')">÷</button> 
        <button class="operador" onclick="adicionar('*')">×</button>

        <button class="num" onclick="adicionar('7')">7</button>
        <button class="num" onclick="adicionar('8')">8</button>
        <button class="num" onclick="adicionar('9')">9</button>
        <button class="operador" onclick="adicionar('-')">-</button>

        <button class="num" onclick="adicionar('4')">4</button>
        <button class="num" onclick="adicionar('5')">5</button>
        <button class="num" onclick="adicionar('6')">6</button>
        <button class="operador" onclick="adicionar('+')">+</button>

        <button class="num" onclick="adicionar('1')">1</button>
        <button class="num" onclick="adicionar('2')">2</button>
        <button class="num" onclick="adicionar('3')">3</button>
        
        <button class="num zero" onclick="adicionar('0')">0</button>
        <button class="num" onclick="adicionar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
